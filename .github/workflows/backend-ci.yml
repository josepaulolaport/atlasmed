name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'shared/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
        working-directory: ./backend
      
      - name: Run linter
        run: bun run lint
        working-directory: ./backend
        continue-on-error: true
      
      - name: Run tests
        run: bun test
        working-directory: ./backend

  deploy:
    name: Deploy Backend via Uncloud
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # ============================================
      # Option 1: Deploy to Uncloud (Self-Hosted)
      # ============================================
      - name: Install Uncloud CLI
        run: curl -fsSL https://uncloud.run/install.sh | sh
      
      - name: Setup SSH for Uncloud
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UNCLOUD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.UNCLOUD_HOST }} >> ~/.ssh/known_hosts
      
      - name: Create .env file from secrets
        working-directory: ./backend
        run: |
          echo "NODE_ENV=production" > .env.production
          echo "PORT=3001" >> .env.production
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env.production
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.production
          echo "CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}" >> .env.production
      
      - name: Deploy Backend to Uncloud
        working-directory: ./backend
        run: |
          uc run \
            --name atlasmed-backend \
            --port api.atlasmed.com:3001/https \
            --env-file .env.production \
            .
        env:
          UNCLOUD_HOST: ${{ secrets.UNCLOUD_HOST }}
      
      - name: Verify Deployment
        run: |
          echo "✅ Backend deployed to https://api.atlasmed.com"
          echo "Caddy will automatically provision SSL certificate"
      
      # ============================================
      # Alternative Options (Uncomment to use)
      # ============================================
      
