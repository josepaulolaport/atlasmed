name: Web CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'shared/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'shared/**'
      - '.github/workflows/web-ci.yml'

jobs:
  test:
    name: Test Web App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
        working-directory: ./web
      
      - name: Run linter
        run: bun run lint
        working-directory: ./web
        continue-on-error: true
      
      - name: Build Next.js app
        run: bun run build
        working-directory: ./web
      
      - name: Run tests
        run: bun test
        working-directory: ./web
        continue-on-error: true

  deploy:
    name: Deploy Web App
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
