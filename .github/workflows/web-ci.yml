name: Web CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'shared/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'shared/**'
      - '.github/workflows/web-ci.yml'

jobs:
  test:
    name: Test Web App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
        working-directory: ./web
      
      - name: Run linter
        run: bun run lint
        working-directory: ./web
        continue-on-error: true
      
      - name: Build Next.js app
        run: bun run build
        working-directory: ./web
      
      - name: Run tests
        run: bun test
        working-directory: ./web
        continue-on-error: true

  deploy:
    name: Deploy Web App via Uncloud
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # ============================================
      # Option 1: Deploy to Uncloud (Self-Hosted)
      # ============================================
      - name: Install Uncloud CLI
        run: curl -fsSL https://uncloud.run/install.sh | sh
      
      - name: Setup SSH for Uncloud
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UNCLOUD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.UNCLOUD_HOST }} >> ~/.ssh/known_hosts
      
      - name: Create .env file from secrets
        working-directory: ./web
        run: |
          echo "NODE_ENV=production" > .env.production
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env.production
          echo "API_SECRET_KEY=${{ secrets.API_SECRET_KEY }}" >> .env.production
      
      - name: Deploy Web App to Uncloud
        working-directory: ./web
        run: |
          uc run \
            --name atlasmed-web \
            --port atlasmed.com:3000/https \
            --port www.atlasmed.com:3000/https \
            --env-file .env.production \
            .
        env:
          UNCLOUD_HOST: ${{ secrets.UNCLOUD_HOST }}
      
      - name: Verify Deployment
        run: |
          echo "✅ Web app deployed to https://atlasmed.com"
          echo "Caddy will automatically provision SSL certificate"
      
