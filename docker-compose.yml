# Docker Compose for Uncloud deployment
# Deploy with: uc compose up

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: atlasmed-backend:latest
    container_name: atlasmed-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      # These will be set in Uncloud or passed via .env
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - atlasmed-network
    labels:
      # Uncloud will use these for automatic HTTPS via Caddy
      - "uncloud.http.routers.backend.rule=Host(`api.atlasmed.com`)"
      - "uncloud.http.routers.backend.entrypoints=https"
      - "uncloud.http.routers.backend.tls.certresolver=letsencrypt"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: atlasmed-web:latest
    container_name: atlasmed-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.atlasmed.com
      # Server-side only variables
      - API_SECRET_KEY=${API_SECRET_KEY}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - atlasmed-network
    labels:
      # Uncloud will use these for automatic HTTPS via Caddy
      - "uncloud.http.routers.web.rule=Host(`atlasmed.com`) || Host(`www.atlasmed.com`)"
      - "uncloud.http.routers.web.entrypoints=https"
      - "uncloud.http.routers.web.tls.certresolver=letsencrypt"

networks:
  atlasmed-network:
    driver: bridge

# Note: For production, you might want to add:
# - Database service (PostgreSQL, MySQL, etc.)
# - Redis for caching
# - Storage volumes for persistence
